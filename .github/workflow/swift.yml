name: EcoRoute DE CI

# 1. Trigger the workflow on every push or pull request to the main branch
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    # 2. Run on a virtual macOS environment provided free by GitHub
    runs-on: macos-14

    steps:
    # 3. Pulls your code repository into the virtual runner machine
    - name: Checkout Code
      uses: actions/checkout@v4

    # 4. Select the correct version of Xcode installed on the GitHub cloud runner
    - name: Select Xcode Version
      run: sudo xcode-select -s /Applications/Xcode.app

    # 5. Build the application and execute your SwiftData/Tax math Unit Tests
    - name: Run Automated Unit Tests
      run: |
        xcodebuild test \
          -project EcoRoute DE.xcodeproj \
          -scheme EcoRoute DE \
          -destination 'platform=iOS Simulator,name=iPhone 15,OS=17.5' \
          -quiet