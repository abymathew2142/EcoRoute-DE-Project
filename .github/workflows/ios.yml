name: iOS starter workflow

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    name: Build and Test default scheme using any available iPhone simulator
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # 4. Select the correct version of Xcode installed on the GitHub cloud runner
      - name: Select Xcode Version
        run: sudo xcode-select -s /Applications/Xcode.app

    # 5. Build the application and execute your SwiftData/Tax math Unit Tests
      - name: Run Automated Unit Tests
        run: |
         # Query the system for available iOS Simulators, filter for the first matching hardware line, and pull its name identifier safely.
          DESTINATION_DEVICE=$(xcrun simctl list devices available | grep -m 1 "iPhone" | awk -F '[()]' '{print $1}' | xargs)
          echo "🚀 Dynamic Architectural Selection: Running tests on [$DESTINATION_DEVICE]"
          
          xcodebuild test \
            -project EcoRouteDE.xcodeproj \
            -scheme EcoRouteDE \
            -destination "platform=iOS Simulator,name=$DESTINATION_DEVICE" \
            -quiet
